name: Sea State Analyzer
version: "0.1.0"
slug: sea_state_analyzer
description: >-
  Sea-state estimation from Signal K vessel data and onboard IMU.
  Connects to a Signal K server via WebSocket, ingests attitude/movement/wind
  data, auto-detects IMU accelerometer via I2C, and publishes wave estimates
  (height, period, direction) back to Signal K as environment.water.waves.*
  deltas.
url: "https://github.com/eburi/sea_state_analyzer"
arch:
  - aarch64
init: false
startup: services
# I2C device access for IMU auto-detection.
# List all plausible buses so the container can access whichever one
# the IMU happens to be on (varies by board / HAT wiring).
devices:
  - /dev/i2c-0
  - /dev/i2c-1
  - /dev/i2c-2
  - /dev/i2c-3
  - /dev/i2c-4
  - /dev/i2c-5
  - /dev/i2c-6
  - /dev/i2c-7
  - /dev/i2c-8
  - /dev/i2c-9
# Persistent output storage mapped to /data inside the container
map:
  - share:rw
# User-configurable options (available in /data/options.json)
options:
  signalk_url: "http://primrose.local:3000"
  sample_rate_hz: 2.0
  imu_enabled: true
  imu_auto_detect: true
  imu_bus_number: 1
  imu_sample_rate_hz: 50.0
  imu_include_mag: true
  publish_to_signalk: true
  enable_plots: false
  log_level: "info"
schema:
  signalk_url: url
  sample_rate_hz: "float(0.5,10)"
  imu_enabled: bool
  imu_auto_detect: bool
  imu_bus_number: "int(0,20)"
  imu_sample_rate_hz: "float(1,200)"
  imu_include_mag: bool
  publish_to_signalk: bool
  enable_plots: bool
  log_level: list(debug|info|warning|error)
