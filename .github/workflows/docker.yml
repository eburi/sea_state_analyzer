name: Build and Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build add-on
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            --amd64 --aarch64 \
            --target sea_state_analyzer \
            --docker-hub eburi
