name: Build and Publish

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build add-on (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Copy src and rust into add-on directory
        run: |
          rm -rf sea_state_analyzer/src sea_state_analyzer/rust
          cp -r src sea_state_analyzer/src
          cp -r rust sea_state_analyzer/rust

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build add-on image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./sea_state_analyzer
          file: ./sea_state_analyzer/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/base:latest

      - name: Derive release image version
        if: github.event_name != 'pull_request'
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push add-on image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./sea_state_analyzer
          file: ./sea_state_analyzer/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sea_state_analyzer/${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/sea_state_analyzer/${{ matrix.arch }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/sea_state_analyzer/${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/base:latest
